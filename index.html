<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Fatihah 1:2 — Tafsir Ibn Kathir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f9f4e8;
      --ink:    #221a0a;
      --soft:   #5c4a2a;
      --gold:   #a0762a;
      --active: #7a3b1e;
      --rule:   #d5c498;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 18px;
      line-height: 1.75;
    }

    /* ── verse bar ───────────────────────────────── */
    .verse-bar {
      flex: none;
      z-index: 200;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding: 14px 0 10px;
      text-align: center;
    }
    .surah-label {
      font-size: 10.5px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 8px;
    }
    .verse-arabic {
      direction: rtl;
      font-family: 'Amiri', serif;
      font-size: clamp(26px, 4.5vw, 42px);
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0 .3em;
    }
    .word {
      cursor: pointer;
      color: var(--soft);
      border-bottom: 2px solid transparent;
      padding-bottom: 2px;
      transition: color .3s, border-color .3s;
    }
    .word.active { color: var(--active); border-bottom-color: var(--gold); }

    /* ── columns area ────────────────────────────── */
    .columns-area {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      position: relative;
      gap: 1px;
      background: var(--rule); /* 1px gaps become column dividers */
    }

    /* Reverse on desktop so columns read RTL (ٱلْعَـٰلَمِينَ → رَبِّ → ٱلْحَمْدُ لِلَّهِ) */
    @media (min-width: 769px) {
      .columns-area { flex-direction: row-reverse; }
    }


    .col-outer {
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Fixed column header — sticky inside col-outer */
    .col-sticky-header {
      flex: none;
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding: 8px 28px;
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Scrollable text area within each column */
    .col-scroll {
      flex: 1 1 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .col-canvas { position: relative; }

    .pt {
      position: absolute;
      line-height: 1.75;
      white-space: nowrap;
      color: var(--ink);
    }

    /* Word SVGs — in the columns-area overlay, don't scroll */
    .medallion {
      position: absolute;
      pointer-events: none;
      z-index: 20;
      overflow: visible;
      shape-rendering: geometricPrecision;
    }

    /* ── footer ──────────────────────────────────── */
    footer {
      flex: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 10px 32px 11px;
      border-top: 1px solid var(--rule);
      font-size: 10.5px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--soft);
    }
    footer a {
      color: var(--gold);
      text-decoration: none;
    }
    footer a:hover { color: var(--active); }
    .footer-github { display: flex; align-items: center; }

    /* ── mobile: single continuous scroll ───────── */
    #mobile-view {
      display: none;
      flex: 1 1 0;
      min-height: 0;
      position: relative; /* SVG medallion anchors here */
    }
    #mobile-scroll {
      position: absolute; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #mobile-canvas { position: relative; }
    @media (max-width: 768px) {
      .columns-area { display: none !important; }
      #mobile-view  { display: block; }
    }
  </style>
</head>
<body>

  <div class="verse-bar" id="verse-bar">
    <div class="surah-label">Al-Fatihah &middot; 1:2 &middot; Tafsir Ibn Kathir</div>
    <div class="verse-arabic">
      <span class="word" data-col="0">ٱلْحَمْدُ لِلَّهِ</span>
      <span class="word" data-col="1">رَبِّ</span>
      <span class="word" data-col="2">ٱلْعَـٰلَمِينَ</span>
    </div>
  </div>

  <div class="columns-area" id="columns-area">
    <div class="col-outer" id="col-0">
      <div class="col-sticky-header" id="header-0"></div>
      <div class="col-scroll" id="scroll-0"><div class="col-canvas" id="canvas-0"></div></div>
    </div>
    <div class="col-outer" id="col-1">
      <div class="col-sticky-header" id="header-1"></div>
      <div class="col-scroll" id="scroll-1"><div class="col-canvas" id="canvas-1"></div></div>
    </div>
    <div class="col-outer" id="col-2">
      <div class="col-sticky-header" id="header-2"></div>
      <div class="col-scroll" id="scroll-2"><div class="col-canvas" id="canvas-2"></div></div>
    </div>
  </div>

  <div id="mobile-view">
    <div id="mobile-scroll"><div id="mobile-canvas"></div></div>
  </div>

  <footer>
    <a href="https://quran.gtaf.org/1/2/tafsir" target="_blank" rel="noreferrer">Tafsir Ibn Kathir &middot; Al-Fatihah 1:2</a>
    <span>quran.gtaf.org</span>
    <a class="footer-github" href="https://github.com/ujji77/quran-pretext" target="_blank" rel="noreferrer" title="GitHub">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
  </footer>

  <script type="module">
    import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext@0.0.3';

    const FONT       = '19px "EB Garamond"';
    const LINE_H     = 32;
    const COL_PAD    = 28;
    const TOP_PAD    = 16;
    const MIN_SLOT_W = 36;

    // ── Arabic word display ───────────────────────────────────
    const ARABIC_FONT_SIZE        = 100;  // px — desktop SVG Arabic text
    const ARABIC_FONT_SIZE_MOBILE = 36;   // px — mobile full-verse SVG
    const ARABIC_FONT_WEIGHT      = 700;  // 400 = regular, 700 = bold
    const ARABIC_GAP              = 4;   // px — breathing room between glyph and prose
    const WORD_VERTICAL_POS       = 0.5;  // 0–1 — vertical position within scroll area (0.5 = centre)
    const WORD_TOP_PADDING        = 0;    // px — extra downward nudge (positive = down)

    const words = [
      {
        id: 'hamd',
        label: 'Al-Ḥamdu Lillāh',
        arabic: ['ٱلْحَمْدُ', 'لِلَّهِ'],
        text:
          'Abu Ja`far bin Jarir said the meaning of Al-Hamdu Lillah is: all thanks are due ' +
          'purely to Allah alone, not to any of the objects that are being worshipped instead ' +
          'of Him, nor to any of His creation. These thanks are due to Allah\'s innumerable ' +
          'favors and bounties, that only He knows the amount of. Allah\'s bounties include ' +
          'creating the tools that help the creation worship Him, the physical bodies with ' +
          'which they are able to implement His commands, the sustenance that He provides ' +
          'them in this life, and the comfortable life He has granted them, without anything ' +
          'or anyone compelling Him to do so. ' +
          'Ibn Jarir further commented that Al-Hamdu Lillah entails praising Allah by ' +
          'mentioning His most beautiful Names and most honorable Attributes. When one ' +
          'proclaims all thanks are due to Allah, he will be thanking Him for His favors ' +
          'and bounties. Hamd is more general than shukr in that it is a statement of ' +
          'praise for one\'s characteristics as well as for what one has done. Thanks alone ' +
          'are given for what was done, not merely for characteristics. ' +
          'Hafs mentioned that Umar said to Ali: we know La ilaha illallah, Subhan Allah ' +
          'and Allahu Akbar — but what of Al-Hamdu Lillah? Ali replied: a statement that ' +
          'Allah liked for Himself, was pleased with for Himself, and He likes that it be ' +
          'repeated. Ibn Abbas said: Al-Hamdu Lillah is the statement of appreciation. ' +
          'When the servant says Al-Hamdu Lillah, Allah says, my servant has praised Me. ' +
          'Imam Ahmad bin Hanbal recorded that Al-Aswad bin Sari said: I said, O Messenger ' +
          'of Allah, should I recite to you words of praise for my Lord that I have ' +
          'collected? He said, verily your Lord likes Al-Hamd. At-Tirmidhi, An-Nasai and ' +
          'Ibn Majah recorded that Jabir bin Abdullah said that the Messenger of Allah said: ' +
          'the best Dhikr is La ilaha illallah and the best supplication is Al-Hamdu Lillah. ' +
          'Ibn Majah recorded that Anas bin Malik said the Messenger of Allah said: no ' +
          'servant is blessed by Allah and says Al-Hamdu Lillah except that what he was ' +
          'given is better than that which he has himself acquired. The letters Alif and Lam ' +
          'before the word Hamd serve to encompass all types of thanks and appreciation for ' +
          'Allah the Exalted. A Hadith stated: O Allah, all of Al-Hamd is due to You, You ' +
          'own all the ownership, all types of good are in Your Hand and all affairs belong to You.',
      },
      {
        id: 'rabb',
        label: 'Rabb',
        arabic: ['رَبِّ'],
        text:
          'Ar-Rabb is the owner who has full authority over his property. Linguistically ' +
          'the word means the master or the one who has the authority to lead. All of these ' +
          'meanings are correct for Allah. When used alone, the word Rabb is used only for ' +
          'Allah. As for other than Allah, it can be used to say Rabb Ad-Dar, the master of ' +
          'such and such object. It was further reported that Ar-Rabb is Allah\'s Greatest Name. ' +
          'The attribute Rabb encompasses three meanings simultaneously: the Creator who ' +
          'brought all things into existence, the Sovereign who has absolute authority over ' +
          'them, and the Sustainer who maintains and nurtures all of creation. It is in this ' +
          'last sense — that of the All-Nurturing — that the word most profoundly reveals ' +
          'His mercy. He sustains even those who deny Him, providing them rain and crops and ' +
          'the beating of their hearts, asking nothing in return but gratitude. ' +
          'The scholars of the language noted that Rabb in its primary sense carries the ' +
          'meaning of gradual nurturing and bringing something to its fullness and completion. ' +
          'Just as a guardian raises a child through stages, providing what is needed at ' +
          'each step, so too does Allah raise creation from its beginning to its final state, ' +
          'guiding, sustaining, and perfecting at every turn. This nurturing extends to the ' +
          'inward life as well as the outward, to the soul as much as to the body, and to ' +
          'communities as much as to individuals.',
      },
      {
        id: 'alamin',
        label: 'Al-ʿĀlamīn',
        arabic: ['ٱلْعَـٰلَمِينَ'],
        text:
          'Al-Alamin is plural for Alam, which encompasses everything in existence except ' +
          'Allah. The word Alam is itself a plural word, having no singular form. The Alamin ' +
          'are different creations that exist in the heavens and the earth, on land and at ' +
          'sea. Every generation of creation is called an Alam. Al-Farra and Abu Ubayd said: ' +
          'Alam includes all that has a mind — the Jinns, mankind, the angels and the devils, ' +
          'but not the animals. ' +
          'Zayd bin Aslam and Abu Muhaysin said: Alam includes all that Allah has created ' +
          'with a soul. Qatadah said of Rabb Al-Alamin: every type of creation is an Alam. ' +
          'Az-Zajjaj said: Alam encompasses everything that Allah created, in this life and ' +
          'in the Hereafter. Al-Qurtubi commented: this is the correct meaning, that the ' +
          'Alam encompasses everything that Allah created in both worlds. ' +
          'Allah said: Pharaoh said, and what is the Lord of the Alamin? Moses said: the ' +
          'Lord of the heavens and the earth, and all that is between them, if you seek to ' +
          'be convinced with certainty. Alam is derived from Alamah — because it is a sign ' +
          'testifying to the existence of its Creator and to His Oneness. Every created ' +
          'thing bears witness in its very existence that it has a Maker. In the perfection ' +
          'of its fashioning it points to the incomparable wisdom of the One who made it. ' +
          'The word Alam and the word Ilm — knowledge — share the same root, for the world ' +
          'is itself a kind of knowledge, a disclosure of the divine, written in the language ' +
          'of form and being.',
      },
    ];

    const NS          = 'http://www.w3.org/2000/svg';
    const columnsArea = document.getElementById('columns-area');

    function createWordSVG(word) {
      const svg   = document.createElementNS(NS, 'svg');
      svg.setAttribute('class', 'medallion');

      const PAD_X = 16;
      const PAD_Y = 10;

      const t = document.createElementNS(NS, 'text');
      t.setAttribute('font-family',        'Amiri, serif');
      t.setAttribute('font-size',          ARABIC_FONT_SIZE);
      t.setAttribute('font-weight',        ARABIC_FONT_WEIGHT);
      t.setAttribute('text-anchor',        'middle');
      t.setAttribute('dominant-baseline',  'middle');
      t.setAttribute('direction',          'rtl');
      t.textContent = Array.isArray(word.arabic) ? word.arabic.join(' ') : word.arabic;

      svg.appendChild(t);

      svg.style.position   = 'absolute';
      svg.style.visibility = 'hidden';
      document.body.appendChild(svg);

      const bbox   = t.getBBox();
      const width  = bbox.width  + PAD_X * 2;
      const height = bbox.height + PAD_Y * 2;

      svg.setAttribute('width',   width);
      svg.setAttribute('height',  height);
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      t.setAttribute('x', width  / 2);
      t.setAttribute('y', height / 2);

      document.body.removeChild(svg);
      svg.style.visibility = '';
      styleArabicSVG(svg, t);
      return svg;
    }

    // ── Arabic SVG visual style ───────────────────────────────
    // Gold fill + layered filter: warm ambient glow + directional depth shadow.
    // Feels like illuminated gold leaf on vellum.
    function styleArabicSVG(svg, t) {
      t.setAttribute('fill', '#873d0f');
      t.setAttribute('stroke', '#7a4e0a');
      t.setAttribute('stroke-width', '1');
      t.setAttribute('paint-order', 'stroke fill');
      // svg.style.filter =
      //   'drop-shadow(0 0 14px rgba(195,135,30,0.55)) ' +
      //   'drop-shadow(0 2px 5px rgba(70,35,0,0.45))';
    }

    // ── pixel-level glyph analysis ───────────────────────────
    // Returns per-row ink extents of the Arabic text rendered at `fontSize`.
    // rows[i] = { y (CSS px from top of canvas), l, r (CSS px, left/right ink edge) }
    function analyzeTextShape(text, fontSize) {
      const SCALE = 2;
      const oc  = document.createElement('canvas');
      const ctx = oc.getContext('2d');
      ctx.font  = `${fontSize * SCALE}px Amiri, serif`;
      const m   = ctx.measureText(text);
      const PAD = Math.ceil(16 * SCALE);
      oc.width  = Math.ceil(m.width) + PAD * 2;
      oc.height = Math.ceil(fontSize * SCALE * 1.9) + PAD * 2;
      ctx.font         = `${fontSize * SCALE}px Amiri, serif`;
      ctx.fillStyle    = '#000';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, oc.width / 2, oc.height / 2);
      const pix  = ctx.getImageData(0, 0, oc.width, oc.height).data;
      const rows = [];
      for (let py = 0; py < oc.height; py++) {
        let l = oc.width, r = -1;
        for (let px = 0; px < oc.width; px++) {
          if (pix[(py * oc.width + px) * 4 + 3] > 8) {
            if (px < l) l = px;
            if (px > r) r = px;
          }
        }
        if (r >= 0) rows.push({ y: py / SCALE, l: l / SCALE, r: r / SCALE });
      }
      return { rows, w: oc.width / SCALE, h: oc.height / SCALE };
    }

    // ── pool helper ───────────────────────────────────────────
    function poolEl(pool, i, parent) {
      if (i >= pool.length) {
        const div = document.createElement('div');
        div.className = 'pt';
        parent.appendChild(div);
        pool.push(div);
      }
      pool[i].style.display = '';
      return pool[i];
    }

    // ── set up one column ─────────────────────────────────────
    function setupColumn(colOuter, colScroll, canvas, word, idx) {
      const W    = colOuter.clientWidth;
      const colW = W - COL_PAD * 2;
      const GAP  = ARABIC_GAP;

      const prepared = prepareWithSegments(word.text, FONT);
      const pool     = [];

      canvas.style.width = W + 'px';

      // Analyse the actual glyph pixel extents once (at the same size as the SVG)
      const arabicText = Array.isArray(word.arabic) ? word.arabic.join(' ') : word.arabic;
      const shape      = analyzeTextShape(arabicText, ARABIC_FONT_SIZE);

      // Word SVG — appended to columns-area (non-scrolling overlay)
      const areaRect = columnsArea.getBoundingClientRect();
      const colRect  = colOuter.getBoundingClientRect();
      const svg      = createWordSVG(word);

      const svgW = parseFloat(svg.getAttribute('width'));
      const svgH = parseFloat(svg.getAttribute('height'));

      // Centre within the column's scroll area, not the full viewport.
      // scrollTopInArea = distance from columns-area top to col-scroll top.
      const scrollTopInArea = colScroll.getBoundingClientRect().top - areaRect.top;
      const orbScreenY = scrollTopInArea + colScroll.clientHeight * WORD_VERTICAL_POS + WORD_TOP_PADDING;
      svg.style.left = `${colRect.left - areaRect.left + W / 2 - svgW / 2}px`;
      svg.style.top  = `${orbScreenY - svgH / 2}px`;
      columnsArea.appendChild(svg);

      // The shape canvas is the same width as the SVG canvas (both sized to bbox + padding).
      // We align them: shapeLeft = column-center minus half the shape canvas width.
      const shapeLeft = W / 2 - shape.w / 2;

      function relayout() {
        const scrollTop  = colScroll.scrollTop;
        const orbCanvasY = orbScreenY + scrollTop;

        // Vertical extent of the shape canvas in column-canvas coordinates
        const shapeTop = orbCanvasY - shape.h / 2;
        const shapeBot = shapeTop + shape.h;

        let cur  = { segmentIndex: 0, graphemeIndex: 0 };
        let y    = TOP_PAD;
        let pi   = 0;
        let done = false;

        for (let j = 0; j < 5000 && !done; j++) {
          if (y + LINE_H > shapeTop && y < shapeBot) {
            // ── scan shape rows for ink in this line band ──────────
            const bandTop = y - shapeTop;
            const bandBot = bandTop + LINE_H;
            let minL = Infinity, maxR = -Infinity;
            for (const row of shape.rows) {
              if (row.y >= bandTop && row.y < bandBot) {
                if (row.l < minL) minL = row.l;
                if (row.r > maxR) maxR = row.r;
              }
            }

            if (maxR > -Infinity) {
              // ink found — carve left and right slots around glyph extents
              const obstL = shapeLeft + minL - GAP;
              const obstR = shapeLeft + maxR + GAP;

              const slotAw = obstL - COL_PAD;
              if (slotAw >= MIN_SLOT_W) {
                const line = layoutNextLine(prepared, cur, slotAw);
                if (line) {
                  const el = poolEl(pool, pi++, canvas);
                  el.style.cssText = `top:${y}px;left:${COL_PAD}px;width:${slotAw}px;`;
                  el.textContent   = line.text;
                  cur = line.end;
                } else done = true;
              }

              if (!done) {
                const slotBw = COL_PAD + colW - obstR;
                if (slotBw >= MIN_SLOT_W) {
                  const line = layoutNextLine(prepared, cur, slotBw);
                  if (line) {
                    const el = poolEl(pool, pi++, canvas);
                    el.style.cssText = `top:${y}px;left:${obstR}px;width:${slotBw}px;`;
                    el.textContent   = line.text;
                    cur = line.end;
                  } else done = true;
                }
              }
            } else {
              // band is within shape vertical extent but no ink — full-width line
              const line = layoutNextLine(prepared, cur, colW);
              if (!line) { done = true; break; }
              const el = poolEl(pool, pi++, canvas);
              el.style.cssText = `top:${y}px;left:${COL_PAD}px;width:${colW}px;`;
              el.textContent   = line.text;
              cur = line.end;
            }
          } else {
            // ── full-width line ─────────────────────────────────────
            const line = layoutNextLine(prepared, cur, colW);
            if (!line) { done = true; break; }
            const el = poolEl(pool, pi++, canvas);
            el.style.cssText = `top:${y}px;left:${COL_PAD}px;width:${colW}px;`;
            el.textContent   = line.text;
            cur = line.end;
          }

          y += LINE_H;
        }

        for (let i = pi; i < pool.length; i++) pool[i].style.display = 'none';
        canvas.style.height = (y + COL_PAD) + 'px';
      }

      colScroll.addEventListener('scroll', relayout, { passive: true });
      relayout();
    }

    // ── mobile: single column, full verse, all text continuous ──
    function initMobile() {
      const mobileView   = document.getElementById('mobile-view');
      const mobileScroll = document.getElementById('mobile-scroll');
      const mobileCanvas = document.getElementById('mobile-canvas');

      const W    = mobileScroll.clientWidth;
      const colW = W - COL_PAD * 2;
      const GAP  = ARABIC_GAP;

      // Concatenate all three tafsir texts into one flow
      const fullText = words.map(w => w.text).join(' ');
      const prepared = prepareWithSegments(fullText, FONT);
      const pool     = [];

      mobileCanvas.style.width = W + 'px';

      // Full verse arabic text for the SVG obstacle
      const arabicText = words.flatMap(w => Array.isArray(w.arabic) ? w.arabic : [w.arabic]).join(' ');
      const shape      = analyzeTextShape(arabicText, ARABIC_FONT_SIZE_MOBILE);

      // Build the full-verse SVG
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('class', 'medallion');
      const PAD_X = 16, PAD_Y = 10;
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('font-family',       'Amiri, serif');
      t.setAttribute('font-size',         ARABIC_FONT_SIZE_MOBILE);
      t.setAttribute('font-weight',       ARABIC_FONT_WEIGHT);
      t.setAttribute('text-anchor',       'middle');
      t.setAttribute('dominant-baseline', 'middle');
      t.setAttribute('direction',         'rtl');
      t.textContent = arabicText;
      svg.appendChild(t);
      svg.style.position   = 'absolute';
      svg.style.visibility = 'hidden';
      document.body.appendChild(svg);
      const bbox   = t.getBBox();
      const svgW   = bbox.width  + PAD_X * 2;
      const svgH   = bbox.height + PAD_Y * 2;
      svg.setAttribute('width',   svgW);
      svg.setAttribute('height',  svgH);
      svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      t.setAttribute('x', svgW / 2);
      t.setAttribute('y', svgH / 2);
      document.body.removeChild(svg);
      svg.style.visibility = '';
      styleArabicSVG(svg, t);

      // Position SVG in the centre of the mobile view (anchored to mobileView)
      const orbScreenY = mobileScroll.clientHeight * WORD_VERTICAL_POS + WORD_TOP_PADDING;
      svg.style.left = `${W / 2 - svgW / 2}px`;
      svg.style.top  = `${orbScreenY - svgH / 2}px`;
      mobileView.appendChild(svg);

      const shapeLeft = W / 2 - shape.w / 2;

      function relayout() {
        const scrollTop  = mobileScroll.scrollTop;
        const orbCanvasY = mobileScroll.clientHeight * WORD_VERTICAL_POS + WORD_TOP_PADDING + scrollTop;
        const shapeTop   = orbCanvasY - shape.h / 2;
        const shapeBot   = shapeTop + shape.h;

        let cur  = { segmentIndex: 0, graphemeIndex: 0 };
        let y    = TOP_PAD;
        let pi   = 0;
        let done = false;

        for (let j = 0; j < 8000 && !done; j++) {
          if (y + LINE_H > shapeTop && y < shapeBot) {
            const bandTop = y - shapeTop;
            const bandBot = bandTop + LINE_H;
            let minL = Infinity, maxR = -Infinity;
            for (const row of shape.rows) {
              if (row.y >= bandTop && row.y < bandBot) {
                if (row.l < minL) minL = row.l;
                if (row.r > maxR) maxR = row.r;
              }
            }
            if (maxR > -Infinity) {
              const obstL  = shapeLeft + minL - GAP;
              const obstR  = shapeLeft + maxR + GAP;
              const slotAw = obstL - COL_PAD;
              if (slotAw >= MIN_SLOT_W) {
                const line = layoutNextLine(prepared, cur, slotAw);
                if (line) { const el = poolEl(pool, pi++, mobileCanvas); el.style.cssText = `top:${y}px;left:${COL_PAD}px;width:${slotAw}px;`; el.textContent = line.text; cur = line.end; }
                else done = true;
              }
              if (!done) {
                const slotBw = COL_PAD + colW - obstR;
                if (slotBw >= MIN_SLOT_W) {
                  const line = layoutNextLine(prepared, cur, slotBw);
                  if (line) { const el = poolEl(pool, pi++, mobileCanvas); el.style.cssText = `top:${y}px;left:${obstR}px;width:${slotBw}px;`; el.textContent = line.text; cur = line.end; }
                  else done = true;
                }
              }
            } else {
              const line = layoutNextLine(prepared, cur, colW);
              if (!line) { done = true; break; }
              const el = poolEl(pool, pi++, mobileCanvas);
              el.style.cssText = `top:${y}px;left:${COL_PAD}px;width:${colW}px;`;
              el.textContent = line.text; cur = line.end;
            }
          } else {
            const line = layoutNextLine(prepared, cur, colW);
            if (!line) { done = true; break; }
            const el = poolEl(pool, pi++, mobileCanvas);
            el.style.cssText = `top:${y}px;left:${COL_PAD}px;width:${colW}px;`;
            el.textContent = line.text; cur = line.end;
          }
          y += LINE_H;
        }

        for (let i = pi; i < pool.length; i++) pool[i].style.display = 'none';
        mobileCanvas.style.height = (y + COL_PAD) + 'px';
      }

      mobileScroll.addEventListener('scroll', relayout, { passive: true });
      relayout();
    }

    // ── init ──────────────────────────────────────────────────
    async function init() {
      await document.fonts.ready;
      if (window.matchMedia('(max-width: 768px)').matches) {
        initMobile();
      } else {
        words.forEach((word, i) => {
          document.getElementById(`header-${i}`).textContent = word.label;
          setupColumn(
            document.getElementById(`col-${i}`),
            document.getElementById(`scroll-${i}`),
            document.getElementById(`canvas-${i}`),
            word,
            i,
          );
        });
      }
    }

    init();
  </script>

</body>
</html>
